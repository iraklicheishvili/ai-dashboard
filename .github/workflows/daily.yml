name: AI Dashboard Pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Which pipeline mode to run"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - finance
          - model
          - monthly
          - render
          - full
      force:
        description: "Bypass cache freshness guards for one-off backfills"
        required: false
        default: false
        type: boolean

  schedule:
    # GitHub cron is UTC. These map to Tbilisi (UTC+4):
    # 07:00 Tbilisi daily lightweight run
    - cron: "0 3 * * *"
    # 08:00 Tbilisi Monday finance refresh
    - cron: "0 4 * * 1"
    # 09:00 Tbilisi Monday model deep-dive refresh
    - cron: "0 5 * * 1"
    # 10:00 Tbilisi every Wednesday — but the monthly job below
    # gates to the first Wednesday of the month via a bash date check.
    # (POSIX cron treats day-of-month + day-of-week as OR, so we cannot
    # encode "first Wednesday" in cron alone; the gate runs in-job.)
    - cron: "0 6 * * 3"

permissions:
  contents: write

concurrency:
  group: ai-dashboard-pipeline
  cancel-in-progress: false

jobs:
  daily:
    name: Daily lightweight run
    if: github.event.schedule == '0 3 * * *' || (github.event_name == 'workflow_dispatch' && (inputs.mode == 'daily' || inputs.mode == 'full'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REDDIT_MODE: ${{ vars.REDDIT_MODE || 'off' }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
        run: |
          if [ "${{ inputs.force || false }}" = "true" ]; then
            python -m src.main --daily --force
          else
            python -m src.main --daily
          fi

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit -m "Daily dashboard update [skip ci]" || echo "No output changes"
          git push

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/dashboard

  finance:
    name: Weekly finance refresh
    if: github.event.schedule == '0 4 * * 1' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'finance')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Run finance-only refresh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ inputs.force || false }}" = "true" ]; then
            python -m src.main --finance-only --force
          else
            python -m src.main --finance-only
          fi

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit -m "Finance refresh [skip ci]" || echo "No output changes"
          git push

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/dashboard

  model:
    name: Weekly model intelligence refresh
    if: github.event.schedule == '0 5 * * 1' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'model')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Run model-only refresh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ inputs.force || false }}" = "true" ]; then
            python -m src.main --model-only --force
          else
            python -m src.main --model-only
          fi

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit -m "Model intelligence refresh [skip ci]" || echo "No output changes"
          git push

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/dashboard

  monthly:
    name: Monthly strengths synthesis
    if: github.event.schedule == '0 6 * * 3' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'monthly')
    runs-on: ubuntu-latest
    steps:
      - name: Gate to first week of month (only on scheduled cron)
        id: gate
        run: |
          # On scheduled runs, only proceed if today is the first Wednesday
          # of the month (day-of-month between 1 and 7). On workflow_dispatch
          # we always proceed because a human asked for it.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — proceeding regardless of date."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DOM=$(date -u +%d)
          DOM_INT=$((10#$DOM))
          if [ "$DOM_INT" -le 7 ]; then
            echo "Today is day $DOM_INT (first week) — proceeding with monthly synthesis."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Today is day $DOM_INT (not first week of month) — skipping. Monthly synthesis only runs on the first Wednesday."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.proceed == 'true'
      - uses: actions/setup-python@v5
        if: steps.gate.outputs.proceed == 'true'
        with:
          python-version: '3.11'
      - if: steps.gate.outputs.proceed == 'true'
        run: pip install -r requirements.txt

      - name: Run monthly-only refresh
        if: steps.gate.outputs.proceed == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ inputs.force || false }}" = "true" ]; then
            python -m src.main --monthly-only --force
          else
            python -m src.main --monthly-only
          fi

      - name: Commit output
        if: steps.gate.outputs.proceed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit -m "Monthly model strengths refresh [skip ci]" || echo "No output changes"
          git push

      - name: Deploy dashboard to GitHub Pages
        if: steps.gate.outputs.proceed == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/dashboard

  render:
    name: Render-only refresh
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'render'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m src.main --render-only
      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit -m "Render dashboard [skip ci]" || echo "No output changes"
          git push
      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/dashboard
